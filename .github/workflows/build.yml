name: Build BABypass Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4

      - name: 安裝依賴 (ldid / xz)
        run: brew install ldid xz

      - name: 安裝 Theos
        run: |
          for i in 1 2 3; do
            echo "::group::🔁 第 $i 次嘗試 clone theos"
            if git clone --recursive https://github.com/theos/theos.git "$THEOS"; then
              echo "::endgroup::"
              echo "✅ Theos 克隆成功"
              break
            fi
            echo "::endgroup::"
            echo "❌ 第 $i 次失敗,清除後等 10 秒重試"
            rm -rf "$THEOS"
            sleep 10
          done
          [ -d "$THEOS/bin" ] || { echo "⛔ Theos 安裝失敗"; exit 1; }

      - name: 下載 iOS SDK
        run: |
          echo "下載 Theos SDKs..."
          curl -sL https://github.com/theos/sdks/archive/refs/heads/master.tar.gz -o sdks.tar.gz
          TMP=$(mktemp -d)
          tar -xf sdks.tar.gz -C "$TMP"
          mv "$TMP"/sdks-master/*.sdk "$THEOS/sdks/"
          rm -rf sdks.tar.gz "$TMP"
          echo "已安裝的 SDK:"
          ls "$THEOS/sdks/"

      - name: 抓官方 fishhook (覆蓋壞檔)
        run: |
          echo "從官方 repo 下載乾淨的 fishhook..."
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c -o fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h -o fishhook.h
          echo "=== fishhook.c 前 30 行 ==="
          head -30 fishhook.c
          echo "✅ 已覆蓋"

      - name: 生成 Tweak.xm (還原星號)
        run: |
          cat > Tweak.xm <<'TWEAK_EOF'
          #import <dlfcn.h>
          #import <string.h>
          #import <mach-o/dyld.h>
          #include "fishhook.h"

          static const char @STAR@kHideKeyword = "hack.dylib";

          static const char @STAR@kFakeImageName = NULL;
          static const struct mach_header @STAR@kFakeImageHeader = NULL;

          static const char @STAR@(@STAR@orig_dyld_get_image_name)(uint32_t image_index);
          static const struct mach_header @STAR@(@STAR@orig_dyld_get_image_header)(uint32_t image_index);

          static const char @STAR@my_dyld_get_image_name(uint32_t image_index) {
              const char @STAR@realName = orig_dyld_get_image_name(image_index);
              if (realName && strstr(realName, kHideKeyword)) {
                  return kFakeImageName;
              }
              return realName;
          }

          static const struct mach_header @STAR@my_dyld_get_image_header(uint32_t image_index) {
              const char @STAR@realName = orig_dyld_get_image_name(image_index);
              if (realName && strstr(realName, kHideKeyword)) {
                  return kFakeImageHeader;
              }
              return orig_dyld_get_image_header(image_index);
          }

          static void setupFakeImageInfo(void) {
              void @STAR@handle = dlopen("/System/Library/Frameworks/UIKit.framework/UIKit", RTLD_LAZY);
              if (handle) {
                  kFakeImageName = "/System/Library/Frameworks/UIKit.framework/UIKit";
                  kFakeImageHeader = (const struct mach_header @STAR@)handle;
                  return;
              }

              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char @STAR@name = _dyld_get_image_name(i);
                  if (name && strstr(name, "UIKit.framework/UIKit")) {
                      kFakeImageName = name;
                      kFakeImageHeader = _dyld_get_image_header(i);
                      return;
                  }
              }

              kFakeImageName = "/usr/lib/libSystem.B.dylib";
              kFakeImageHeader = _dyld_get_image_header(0);
          }

          %ctor {
              orig_dyld_get_image_name = (const char @STAR@(@STAR@)(uint32_t))dlsym(RTLD_DEFAULT, "_dyld_get_image_name");
              orig_dyld_get_image_header = (const struct mach_header @STAR@(@STAR@)(uint32_t))dlsym(RTLD_DEFAULT, "_dyld_get_image_header");

              setupFakeImageInfo();

              struct rebinding rebindings[] = {
                  {"_dyld_get_image_name",   (void @STAR@)my_dyld_get_image_name,   (void @STAR@@STAR@)&orig_dyld_get_image_name},
                  {"_dyld_get_image_header", (void @STAR@)my_dyld_get_image_header, (void @STAR@@STAR@)&orig_dyld_get_image_header}
              };
              rebind_symbols(rebindings, sizeof(rebindings) / sizeof(struct rebinding));
          }
          TWEAK_EOF
          sed -i '' "s/@STAR@/$(printf '\052')/g" Tweak.xm
          echo "=== 還原後檢查 (應看到 void * 和 (*orig) ) ==="
          grep -n "void \|orig_dyld" Tweak.xm

      - name: 編譯 dylib
        run: |
          echo "開始 make..."
          make clean || true
          make -j"$(sysctl -n hw.logicalcpu)" FINALPACKAGE=1
          echo "✅ 編譯完成"

      - name: 收集產物
        run: |
          mkdir -p artifacts
          if [ -f ".theos/obj/BABypass.dylib" ]; then
            cp .theos/obj/BABypass.dylib artifacts/
          fi
          find . -name ".dylib" -not -path "./theos/" -exec cp {} artifacts/ \; 2>/dev/null || true
          find ./packages -name "*.deb" -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "產物內容:"
          ls -lh artifacts/

      - name: 上傳 Artifact (v4)
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-${{ github.sha }}
          path: artifacts/
