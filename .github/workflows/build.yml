name: Build BABypass Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允許手動觸發

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4

      - name: 安裝 Theos（帶重試與錯誤排查）
        run: |
          # 顯示網路基本資訊（出事時可查）
          echo "=== DNS 測試 ==="
          nslookup github.com || true
          ping -c 2 github.com || true

          # 嘗試 clone theos，最多 3 次
          for i in 1 2 3; do
            echo "::group::🔁 第 $i 次嘗試 git clone theos"
            if git clone --recursive https://github.com/theos/theos.git ~/theos; then
              echo "::endgroup::"
              echo "✅ Theos 克隆成功"
              break
            else
              echo "::endgroup::"
              echo "❌ 第 $i 次失敗，清除殘留並等待 15 秒..."
              rm -rf ~/theos 2>/dev/null || true
              sleep 15
            fi
          done

          # 最終檢查
          if [ ! -d ~/theos ]; then
            echo "⛔ 嘗試 3 次仍無法安裝 Theos，工作流中止"
            exit 1
          fi

          # 子模塊二次確保
          cd ~/theos
          git submodule update --init --recursive || echo "⚠️ 子模塊更新未完全，但嘗試繼續"
          echo "export THEOS=~/theos" >> ~/.bash_profile

      - name: 編譯 dylib
        run: |
          # 導入環境變量
          export THEOS=~/theos
          # 進入專案目錄
          cd $GITHUB_WORKSPACE
          echo "開始 make..."
          make clean
          make -j$(sysctl -n hw.logicalcpu)
          echo "✅ 編譯完成"

      - name: 收集產物
        run: |
          mkdir -p artifacts
          # Theos 預設編譯產物路徑
          if [ -f ".theos/obj/BABypass.dylib" ]; then
            cp .theos/obj/BABypass.dylib artifacts/
          elif [ -f "BABypass.dylib" ]; then
            cp BABypass.dylib artifacts/
          else
            # 嘗試尋找任何 .dylib 檔
            find . -name ".dylib" -not -path "./.theos/" -exec cp {} artifacts/ \;
          fi
          echo "產物內容："
          ls -lh artifacts/

      - name: 上傳 Artifact (v4)
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-${{ github.sha }}
          path: artifacts/
